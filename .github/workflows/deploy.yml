name: Deploy to Cloudflare Pages

on:
  push:
    tags:
      - 'v*'

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      CF_ACCOUNT_ID: "6487ff5137937b16e91c02fb42372f75"
      CF_PROJECT: "history-mrwuliu-top"
    steps:
      - uses: actions/checkout@v4

      - name: Deploy via Direct Upload API
        run: |
          DEPLOY_RESULT=$(curl -s -X POST \
            "https://api.cloudflare.com/client/v4/accounts/${CF_ACCOUNT_ID}/pages/projects/${CF_PROJECT}/deployments" \
            -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" \
            -F "manifest={\"/index.html\":\"/index.html\",\"/script.js\":\"/script.js\",\"/styles.css\":\"/styles.css\"}" \
            -F "/index.html=@public/index.html;type=text/html" \
            -F "/script.js=@public/script.js;type=application/javascript" \
            -F "/styles.css=@public/styles.css;type=text/css")

          echo "$DEPLOY_RESULT"

          SUCCESS=$(echo "$DEPLOY_RESULT" | python3 -c "import sys,json; print(json.load(sys.stdin).get('success', False))")
          if [ "$SUCCESS" != "True" ]; then
            echo "::error::Deployment failed"
            exit 1
          fi

          URL=$(echo "$DEPLOY_RESULT" | python3 -c "import sys,json; r=json.load(sys.stdin)['result']; print(r.get('url','N/A'))")
          echo "Deployed to: $URL"
